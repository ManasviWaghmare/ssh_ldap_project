{% extends 'base.html' %}

{% block title %}Login - SSH Management{% endblock %}

{% block content %}
<div class="glass-container" style="max-width: 400px;">
    <h2>Sign In</h2>
    <p style="color: #94a3b8; margin-bottom: 2rem;">Log in using your LDAP credentials.</p>
    
    {% if form.errors %}
        <div class="alert alert-error">
            Your username and password didn't match. Please try again.
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username" class="form-label">Username</label>
            <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required id="id_username" class="form-control" placeholder="Enter your LDAP UID">
        </div>
        
        <div class="form-group">
            <label for="id_password" class="form-label">Password</label>
            <input type="password" name="password" autocomplete="current-password" required id="id_password" class="form-control" placeholder="Enter LDAP Password">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
    </form>
</div>
{% endblock %}
